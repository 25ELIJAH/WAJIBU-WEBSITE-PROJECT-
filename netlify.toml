# ── WAJIBU NETLIFY CONFIG ─────────────────────────────────────────
# Build settings (update if you add a build step later)
[build]
  publish = "."

# ── CACHING HEADERS ───────────────────────────────────────────────
# Images — cached 1 year (immutable: filename never changes)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS and JS — cached 1 year
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Favicon and other static assets
[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# HTML — always revalidate so updates are seen immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Root (clean URLs without .html)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

# ── REDIRECTS (clean URLs) ────────────────────────────────────────
[[redirects]]
  from = "/index"
  to = "/"
  status = 301

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/insights"
  to = "/insights.html"
  status = 200

[[redirects]]
  from = "/impact"
  to = "/impact.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200
